<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节庆美陈智能体顶配提示词生成器 - 古月AI智能体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#1f1c2c,#5f5c7a,#1f1c2c);
  background-size:400% 400%;
  animation:bgmove 20s infinite;
  color:white;
  padding:50px;
}
@keyframes bgmove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.container{max-width:1200px;margin:auto;}
.title{
  font-size:36px;text-align:center;margin-bottom:40px;
  background:linear-gradient(90deg,#f9c846,#ffffff,#f9c846);
  -webkit-background-clip:text;color:transparent;font-weight:700;
}
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);
  padding:30px;border-radius:16px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);margin-bottom:40px;
}
input, select{
  width:100%;padding:14px;margin-top:10px;margin-bottom:20px;
  border-radius:10px;border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.3);color:white;font-size:15px;
}
button{
  width:100%;padding:14px;border:none;border-radius:10px;
  font-weight:700;font-size:16px;cursor:pointer;
  background:linear-gradient(135deg,#f9c846,#f5a623);color:#111;
  transition:0.3s;
}
button:hover{transform:translateY(-2px);box-shadow:0 0 15px #f9c846;}
.results{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
  gap:20px;
}
.promptCard{
  background:rgba(255,255,255,0.08);padding:20px;border-radius:14px;
  border-left:4px solid #f9c846;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  transition:0.3s;
}
.promptCard:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
.promptTitle{
  font-size:18px;margin-bottom:10px;color:#f9c846;
}
.promptText{
  white-space:pre-wrap;font-size:14px;line-height:1.6;
}
.copyBtn{
  margin-top:12px;padding:8px 16px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#f9c846,#f5a623);
  cursor:pointer;font-weight:600;transition:0.3s;
}
.copyBtn.copied{
  background:#444;color:white;
}
.toast{
  position:fixed;bottom:30px;right:30px;
  background:rgba(0,0,0,0.7);color:#fff;
  padding:12px 20px;border-radius:10px;
  font-size:14px;opacity:0;pointer-events:none;
  transition:0.4s;
}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="container">
  <div class="title">节庆美陈智能体顶配提示词生成器 - 古月AI智能体</div>
  <div class="card">
    <label>请输入节庆主题/场景/甲方行业属性</label>
    <input id="inputText" placeholder="例如：元宵节-餐饮广场-春节氛围">
    <button onclick="generate()">生成20组美陈提示词</button>
  </div>
  <div id="results" class="results"></div>
</div>
<div id="toast" class="toast">提示词已复制</div>

<script>
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

// 主背景、辅助板、前景随机元素
let mainBg=["竖向背景板","横向背景板","拱门式入口","弧形组合","落地组合背景","非对称结构背景"]
let auxBoard=["高低错落板","异形板","镂空板","浮雕板"]
let foreground=["彩球","灯笼","礼盒","假绿植","互动装置","延展地面元素"]
let colors=["亮橙红","活力黄","亲和蓝","冷色渐变","稳重灰","粉彩渐变"]
let structures=["局部立体造型","轻微悬空","局部浮雕","前景随机组合","可拆卸灵活"]
let textures=["渐变喷涂","烤漆处理","纹理效果","浮雕质感","木质纹理","金属质感"]

function showToast(msg){
  let t = document.getElementById("toast")
  t.innerText=msg
  t.classList.add("show")
  setTimeout(()=>{t.classList.remove("show")},1800)
}

function generate(){
  let text = document.getElementById("inputText").value.trim()
  if(!text){alert("请输入文字内容");return;}
  let container = document.getElementById("results")
  container.innerHTML=""
  
  for(let i=1;i<=20;i++){
    let promptText = `你需要设计的节庆美陈是"${text}"，场景随机选择：${rand(mainBg)}，辅助板设计：${rand(auxBoard)}，前景装置：${rand(foreground)}，装置结构：${rand(structures)}，板材质感与画面效果：${rand(textures)}，颜色方案：${rand(colors)}，中等造价 3000-8000 元，可施工写实效果，空间层次丰富，突出节日氛围与沉浸感，杰作`
    
    let card=document.createElement("div")
    card.className="promptCard"
    card.innerHTML=`
      <div class="promptTitle">美陈提示词 #${i}</div>
      <div class="promptText">${promptText}</div>
      <button class="copyBtn">复制提示词</button>
    `
    let btn=card.querySelector("button")
    btn.onclick=function(){
      navigator.clipboard.writeText(promptText)
      btn.innerText="已复制"
      btn.classList.add("copied")
      showToast("提示词已复制")
      setTimeout(()=>{
        btn.innerText="复制提示词"
        btn.classList.remove("copied")
      },2000)
    }
    container.appendChild(card)
  }
}
</script>
</body>
</html>
